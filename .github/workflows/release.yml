name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: claude-search-darwin-arm64
          - target: bun-darwin-x64
            artifact: claude-search-darwin-x64
          - target: bun-linux-x64
            artifact: claude-search-linux-x64
          - target: bun-linux-arm64
            artifact: claude-search-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun build --compile --target=${{ matrix.target }} index.ts --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: chmod +x claude-search-*
      - uses: softprops/action-gh-release@v2
        with:
          files: claude-search-*
          generate_release_notes: true
