  <text x="56" y="356" class="term cyan">repos/api</text>
  <text x="160" y="356" class="term white">canary <tspan class="hl">deploy</tspan> で新バージョ...</text>

  <text x="56" y="374" class="term cyan">repos/hoshu</text>
  <text x="160" y="374" class="term white">GH Actionsの<tspan class="hl">deploy</tspan>修正</text>

