<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="660" viewBox="0 0 1040 660">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .term { font-family: 'JetBrains Mono', 'SF Mono', 'Monaco', 'Menlo', monospace; font-size: 12px; }
      .dim { fill: #6b7280; }
      .cyan { fill: #22d3ee; font-weight: bold; }
      .green { fill: #4ade80; }
      .yellow { fill: #facc15; }
      .red { fill: #f87171; font-weight: bold; }
      .white { fill: #e5e7eb; }
      .bright { fill: #f9fafb; }
      .hl { fill: #facc15; font-weight: bold; }
      .separator { stroke: #374151; stroke-width: 1; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="50%" stop-color="#f0e6ff"/>
      <stop offset="100%" stop-color="#ffe0f0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1040" height="660" rx="0" fill="url(#bg)"/>

  <!-- Window with shadow -->
  <g filter="url(#shadow)">
    <rect x="40" y="40" width="960" height="580" rx="10" fill="#1a1a2e"/>
  </g>

  <!-- Title bar -->
  <rect x="40" y="40" width="960" height="36" rx="10" fill="#16162a"/>
  <rect x="40" y="66" width="960" height="10" fill="#16162a"/>
  <!-- Traffic lights -->
  <circle cx="60" cy="58" r="6" fill="#ff5f57"/>
  <circle cx="80" cy="58" r="6" fill="#febc2e"/>
  <circle cx="100" cy="58" r="6" fill="#28c840"/>
  <text x="520" y="62" text-anchor="middle" class="term dim" font-size="12">claude-search</text>

  <!-- Prompt line -->
  <text x="56" y="98" class="term green">&#x276F;</text>
  <text x="70" y="98" class="term bright">claude-search</text>
  <text x="182" y="98" class="term yellow">deploy</text>

