  <text x="436" y="194" class="term dim">session: a1b2c3d4-e5f6-7890-abcd-ef1234567890</text>
  <text x="436" y="212" class="term dim">resume:  claude --resume a1b2c3d4-e5f6-7890-abcd-ef1234567890</text>

